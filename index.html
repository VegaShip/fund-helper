<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>QDII基金估值小助手</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #f5f6fa;
  min-height: 100vh; min-height: 100dvh;
  overflow-x: hidden;
  padding-bottom: 70px;
}

/* ===== Header ===== */
.header {
  background: linear-gradient(135deg, #1a73e8 0%, #1557b0 100%);
  color: #fff; padding: 44px 16px 12px;
  position: sticky; top: 0; z-index: 10;
  box-shadow: 0 2px 12px rgba(26,115,232,0.3);
}
.header-title { font-size: 17px; font-weight: 700; text-align: center; letter-spacing: 0.5px; }
.header-sub { font-size: 10px; text-align: center; opacity: 0.7; margin-top: 1px; }

/* ===== Summary ===== */
.summary {
  margin: -10px 12px 8px;
  background: #fff;
  border-radius: 14px;
  padding: 14px;
  box-shadow: 0 2px 16px rgba(0,0,0,0.06);
  position: relative; z-index: 2;
}
.summary-row { display: flex; justify-content: space-between; align-items: baseline; }
.summary-label { font-size: 12px; color: #999; }
.summary-value { font-size: 22px; font-weight: 800; color: #333; }
.summary-value .currency { font-size: 13px; font-weight: 600; }
.summary-details { display: flex; gap: 0; margin-top: 8px; }
.summary-item { flex: 1; text-align: center; border-right: 1px solid #f0f0f0; }
.summary-item:last-child { border-right: none; }
.summary-item .val { font-size: 15px; font-weight: 700; }
.summary-item .val.up { color: #e74c3c; }
.summary-item .val.down { color: #00b894; }
.summary-item .lbl { font-size: 10px; color: #999; margin-top: 1px; }

/* ===== Tab Content ===== */
.tab-content { display: none; }
.tab-content.active { display: block; }

/* ===== Section ===== */
.section { padding: 0 12px; margin-top: 2px; }
.section-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 6px 4px; margin-bottom: 2px;
}
.section-title { font-size: 14px; font-weight: 700; color: #333; }
.section-action { font-size: 12px; color: #1a73e8; font-weight: 600; cursor: pointer; padding: 4px 8px; }

/* ===== Fund Card ===== */
.fund-card {
  background: #fff;
  border-radius: 12px;
  padding: 12px 14px;
  margin-bottom: 8px;
  box-shadow: 0 1px 8px rgba(0,0,0,0.04);
  cursor: pointer;
  transition: transform 0.12s;
  position: relative;
  overflow: hidden;
}
.fund-card:active { transform: scale(0.98); }
.fund-card .top { display: flex; justify-content: space-between; align-items: flex-start; }
.fund-card .name { font-size: 14px; font-weight: 700; color: #333; }
.fund-card .code { font-size: 10px; color: #999; margin-top: 1px; }
.fund-card .tag {
  display: inline-block; font-size: 9px; padding: 1px 5px;
  border-radius: 3px; font-weight: 600; margin-left: 4px; vertical-align: middle;
}
.fund-card .tag.qdii { background: #e8f0fe; color: #1a73e8; }
.fund-card .tag.top { background: #ffe8e8; color: #e74c3c; }
.fund-card .tag.bad { background: #e8f8f0; color: #00b894; }
.fund-card .nav-info { text-align: right; }
.fund-card .nav-value { font-size: 17px; font-weight: 800; color: #333; }
.fund-card .nav-date { font-size: 10px; color: #bbb; margin-top: 1px; }
.fund-card .bottom { display: flex; margin-top: 8px; gap: 0; }
.fund-card .stat { flex: 1; text-align: center; border-right: 1px solid #f5f5f5; }
.fund-card .stat:last-child { border-right: none; }
.fund-card .stat .s-val { font-size: 13px; font-weight: 700; }
.fund-card .stat .s-val.up { color: #e74c3c; }
.fund-card .stat .s-val.down { color: #00b894; }
.fund-card .stat .s-lbl { font-size: 10px; color: #bbb; margin-top: 1px; }

/* ===== Ranking Card ===== */
.rank-card {
  background: #fff;
  border-radius: 12px;
  padding: 10px 14px;
  margin-bottom: 6px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.03);
  display: flex; align-items: center; gap: 10px;
}
.rank-num {
  width: 24px; height: 24px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 800; color: #fff; flex-shrink: 0;
}
.rank-num.r1 { background: linear-gradient(135deg,#ff6b6b,#e74c3c); }
.rank-num.r2 { background: linear-gradient(135deg,#ff9f43,#f39c12); }
.rank-num.r3 { background: linear-gradient(135deg,#feca57,#f1c40f); color: #333; }
.rank-num.rn { background: #dfe6e9; color: #666; }
.rank-info { flex: 1; min-width: 0; }
.rank-name { font-size: 13px; font-weight: 700; color: #333; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.rank-code { font-size: 10px; color: #999; }
.rank-pct { font-size: 16px; font-weight: 800; text-align: right; flex-shrink: 0; }
.rank-pct.up { color: #e74c3c; }
.rank-pct.down { color: #00b894; }
.rank-bar-wrap { width: 60px; height: 4px; background: #f0f0f0; border-radius: 2px; margin-left: 8px; flex-shrink: 0; overflow: hidden; }
.rank-bar { height: 100%; border-radius: 2px; }
.rank-bar.up { background: linear-gradient(90deg,#e74c3c,#ff6b6b); }
.rank-bar.down { background: linear-gradient(90deg,#00b894,#55efc4); }

/* ===== Rotation Suggestions ===== */
.rotate-card {
  background: #fff;
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 10px;
}
.rotate-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.rotate-icon { font-size: 20px; }
.rotate-title { font-size: 14px; font-weight: 700; color: #333; }
.rotate-desc { font-size: 11px; color: #999; margin-top: 2px; }
.rotate-fund { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #f5f5f5; }
.rotate-fund:last-child { border-bottom: none; }
.rotate-fund .rf-name { font-size: 13px; font-weight: 600; color: #333; }
.rotate-fund .rf-code { font-size: 10px; color: #999; }
.rotate-fund .rf-pct { font-size: 13px; font-weight: 700; }
.rotate-fund .rf-pct.up { color: #e74c3c; }
.rotate-fund .rf-pct.down { color: #00b894; }
.rotate-badge {
  font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: 700; margin-left: 6px;
}
.rotate-badge.buy { background: #ffe8e8; color: #e74c3c; }
.rotate-badge.sell { background: #e8f8f0; color: #00b894; }
.rotate-badge.hold { background: #f0f0f0; color: #666; }

/* ===== Seed Bar ===== */
.seed-bar {
  text-align: center; padding: 12px; display: none;
}
.seed-btn {
  background: linear-gradient(135deg,#1a73e8,#1557b0);
  color: #fff; border: none; border-radius: 10px;
  padding: 12px 28px; font-size: 14px; font-weight: 700; font-family: inherit;
  cursor: pointer; box-shadow: 0 4px 16px rgba(26,115,232,0.3);
}
.seed-btn:active { transform: scale(0.96); }

/* ===== Empty State ===== */
.empty-state { text-align: center; padding: 40px 20px; color: #ccc; }
.empty-state .icon { font-size: 40px; margin-bottom: 10px; }
.empty-state p { font-size: 13px; line-height: 1.6; }
.btn-empty {
  margin-top: 14px; padding: 10px 24px; border: none; border-radius: 8px;
  background: #1a73e8; color: #fff; font-size: 13px; font-weight: 700; font-family: inherit;
  cursor: pointer;
}
.btn-empty:active { opacity: 0.85; }

/* ===== FAB ===== */
.fab {
  position: fixed; bottom: 80px; right: 16px;
  width: 52px; height: 52px; border-radius: 50%;
  background: linear-gradient(135deg, #1a73e8, #1557b0);
  color: #fff; border: none; font-size: 26px; font-weight: 300;
  box-shadow: 0 4px 16px rgba(26,115,232,0.4);
  cursor: pointer; z-index: 20;
  transition: transform 0.15s;
  display: flex; align-items: center; justify-content: center;
}
.fab:active { transform: scale(0.92); }

/* ===== Bottom Tab ===== */
.tab-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  z-index: 30;
  background: #fff;
  border-top: 1px solid #f0f0f0;
  display: flex;
  padding-bottom: env(safe-area-inset-bottom, 0);
}
.tab-item {
  flex: 1; text-align: center; padding: 8px 0 6px;
  cursor: pointer; transition: all 0.15s;
  -webkit-user-select: none; user-select: none;
}
.tab-item .tab-icon { font-size: 20px; display: block; }
.tab-item .tab-label { font-size: 10px; color: #999; font-weight: 600; margin-top: 1px; }
.tab-item.active .tab-label { color: #1a73e8; }
.tab-item.active .tab-icon { transform: scale(1.05); }

/* ===== Modal ===== */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.45);
  z-index: 100; display: none;
  justify-content: flex-end; align-items: center;
  flex-direction: column;
  backdrop-filter: blur(2px);
}
.modal-overlay.show { display: flex; }
.modal-overlay.show .modal-sheet { animation: slideUp 0.3s ease-out; }
@keyframes slideUp { 0% { transform: translateY(100%); } 100% { transform: translateY(0); } }
.modal-sheet {
  background: #fff; width: 100%; max-width: 500px;
  border-radius: 20px 20px 0 0;
  padding: 20px 20px calc(env(safe-area-inset-bottom, 16px) + 16px);
  max-height: 85vh; overflow-y: auto;
}
.modal-handle { width: 36px; height: 4px; border-radius: 2px; background: #ddd; margin: 0 auto 16px; }
.modal-title { font-size: 17px; font-weight: 700; color: #333; text-align: center; margin-bottom: 14px; }

.form-group { margin-bottom: 12px; }
.form-label { display: block; font-size: 12px; color: #888; font-weight: 600; margin-bottom: 4px; }
.form-input {
  width: 100%; height: 40px;
  border: 1.5px solid #e8e8e8; border-radius: 10px;
  padding: 0 12px; font-size: 14px; font-family: inherit;
  outline: none; transition: border-color 0.2s;
  background: #fafafa;
}
.form-input:focus { border-color: #1a73e8; background: #fff; }
.form-input::placeholder { color: #ccc; }
.form-row { display: flex; gap: 10px; }
.form-row .form-group { flex: 1; }
.btn-submit {
  width: 100%; height: 42px;
  background: linear-gradient(135deg, #1a73e8, #1557b0);
  color: #fff; border: none; border-radius: 10px;
  font-size: 15px; font-weight: 700; font-family: inherit;
  cursor: pointer; transition: opacity 0.15s; margin-top: 4px;
}
.btn-submit:active { opacity: 0.85; }
.btn-cancel {
  width: 100%; height: 38px;
  background: none; color: #999; border: none;
  font-size: 13px; font-weight: 600; font-family: inherit;
  cursor: pointer; margin-top: 4px;
}

.confirm-bar {
  display: none; position: fixed; bottom: 0; left: 0; right: 0;
  z-index: 30; padding: 16px; padding-bottom: calc(env(safe-area-inset-bottom, 16px) + 16px);
  background: #fff; box-shadow: 0 -4px 20px rgba(0,0,0,0.1);
  justify-content: space-between; gap: 10px;
}
.confirm-bar.show { display: flex; }
.confirm-bar .btn { flex: 1; height: 44px; border-radius: 10px; border: none; font-size: 15px; font-weight: 700; font-family: inherit; cursor: pointer; }
.confirm-bar .btn-yes { background: #e74c3c; color: #fff; }
.confirm-bar .btn-no { background: #f5f5f5; color: #666; }
.confirm-bar .btn:active { opacity: 0.8; }

.toast {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  z-index: 200; background: rgba(0,0,0,0.75);
  color: #fff; padding: 12px 22px; border-radius: 10px;
  font-size: 13px; font-weight: 600;
  pointer-events: none; opacity: 0; transition: opacity 0.25s;
}
.toast.show { opacity: 1; }

@media (min-width: 500px) {
  .summary, .section { max-width: 480px; margin-left: auto; margin-right: auto; }
  .header { padding-left: calc(50vw - 240px); padding-right: calc(50vw - 240px); }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-title">📊 QDII 基金估值小助手</div>
  <div class="header-sub">每周调仓 · 涨跌排行 · 自主管理</div>
</div>

<div class="summary" id="summary">
  <div class="summary-row">
    <span class="summary-label">总持仓金额</span>
    <span class="summary-value" id="totalValue"><span class="currency">¥</span>0.00</span>
  </div>
  <div class="summary-details">
    <div class="summary-item"><div class="val" id="todayPnl">--</div><div class="lbl">今日收益</div></div>
    <div class="summary-item"><div class="val" id="totalPnl">--</div><div class="lbl">累计收益</div></div>
    <div class="summary-item"><div class="val" id="fundCount">0</div><div class="lbl">持有基金</div></div>
  </div>
</div>

<!-- Tab: 持仓 -->
<div class="tab-content active" id="tabPortfolio">
  <div class="section">
    <div class="section-header">
      <span class="section-title">我的基金</span>
      <span class="section-action" id="manageBtn">管理</span>
    </div>
    <div id="fundList"></div>
  </div>
</div>

<!-- Tab: 排行 -->
<div class="tab-content" id="tabRanking">
  <div class="section">
    <div class="section-header">
      <span class="section-title">周涨跌排行榜</span>
      <span class="section-action" id="rankRefresh">刷新</span>
    </div>
    <div id="rankList"></div>
  </div>
</div>

<!-- Tab: 调仓 -->
<div class="tab-content" id="tabRotate">
  <div class="section">
    <div class="section-header">
      <span class="section-title">本周调仓建议</span>
      <span class="section-action" id="rotateRefresh">刷新</span>
    </div>
    <div id="rotateContent"></div>
  </div>
</div>

<button class="fab" id="addBtn" style="display:none;">+</button>

<!-- Tab Bar -->
<div class="tab-bar">
  <div class="tab-item active" data-tab="tabPortfolio">
    <span class="tab-icon">📋</span>
    <span class="tab-label">持仓</span>
  </div>
  <div class="tab-item" data-tab="tabRanking">
    <span class="tab-icon">🏆</span>
    <span class="tab-label">排行</span>
  </div>
  <div class="tab-item" data-tab="tabRotate">
    <span class="tab-icon">🔄</span>
    <span class="tab-label">调仓</span>
  </div>
</div>

<div class="confirm-bar" id="confirmBar">
  <button class="btn btn-no" id="cancelDelete">取消</button>
  <button class="btn btn-yes" id="confirmDelete">删除</button>
</div>

<!-- Add Fund Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">添加基金</div>
    <div class="form-group">
      <label class="form-label">基金代码</label>
      <input class="form-input" id="fCode" placeholder="如 000071">
    </div>
    <div class="form-group">
      <label class="form-label">基金名称</label>
      <input class="form-input" id="fName" placeholder="如 华夏恒生ETF联接">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">持有份额</label>
        <input class="form-input" id="fShares" placeholder="0.00" type="number" step="0.01">
      </div>
      <div class="form-group">
        <label class="form-label">成本净值</label>
        <input class="form-input" id="fCost" placeholder="0.0000" type="number" step="0.0001">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">当前净值 <span style="color:#ccc;font-weight:400;">（可选）</span></label>
      <input class="form-input" id="fNav" placeholder="留空则与成本价相同" type="number" step="0.0001">
    </div>
    <button class="btn-submit" id="addSubmit">添加</button>
    <button class="btn-cancel" id="addCancel">取消</button>
  </div>
</div>

<!-- Update NAV Modal -->
<div class="modal-overlay" id="navModal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="navModalTitle">更新净值</div>
    <div style="display:flex;align-items:baseline;gap:8px;justify-content:center;margin-bottom:10px;">
      <span style="font-size:12px;color:#999;">当前净值</span>
      <span style="font-size:20px;font-weight:800;color:#333;" id="navCurrentDisplay">--</span>
    </div>
    <div class="form-group">
      <label class="form-label">新净值</label>
      <input class="form-input" id="navNew" placeholder="输入最新净值" type="number" step="0.0001">
    </div>
    <div style="text-align:center;color:#ccc;font-size:11px;margin:-6px 0 10px;">— 或 —</div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">估算涨跌 %</label>
        <input class="form-input" id="navEstPct" placeholder="如 2.5" type="number" step="0.01">
      </div>
      <div class="form-group">
        <label class="form-label">得出净值</label>
        <input class="form-input" id="navEstResult" readonly style="background:#f5f5f5;color:#333;font-weight:700;">
      </div>
    </div>
    <button class="btn-submit" id="navSubmit">更新净值</button>
    <button class="btn-cancel" id="navCancel">取消</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== Data =====
const STORAGE_KEY = 'fund_helper_data';
let funds = [];
let deleteTargetId = null;
let updateTargetId = null;

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) { funds = JSON.parse(raw); }
  } catch(e) { funds = []; }
}
function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(funds));
}

// ===== Sample Funds Data (2026年TOP QDII基金) =====
const SAMPLE_FUNDS = [
  { code: '000071', name: '华夏恒生ETF联接A', shares: 1000, costNav: 1.4500, baseNav: 1.5234 },
  { code: '118001', name: '易方达全球成长精选A', shares: 500, costNav: 2.8900, baseNav: 3.2456 },
  { code: '539002', name: '建信新兴市场混合A', shares: 800, costNav: 1.7600, baseNav: 1.8923 },
  { code: '000834', name: '嘉实美国成长股票', shares: 600, costNav: 1.9200, baseNav: 2.1345 },
  { code: '161130', name: '建信纳斯达克100指数A', shares: 1200, costNav: 1.2300, baseNav: 1.3567 },
  { code: '501018', name: '南方原油A', shares: 2000, costNav: 1.1200, baseNav: 1.4567 },
  { code: '003322', name: '易方达原油A', shares: 1500, costNav: 1.0800, baseNav: 1.3890 },
  { code: '513310', name: '华泰柏瑞中韩半导体ETF', shares: 3000, costNav: 1.4500, baseNav: 1.6789 },
  { code: '001668', name: '天弘全球高端制造A', shares: 700, costNav: 1.8500, baseNav: 2.2789 },
  { code: '005877', name: '华夏移动互联混合', shares: 900, costNav: 1.3800, baseNav: 1.5678 },
];

// Generate realistic NAV history for sample funds
function genNavHistory(baseNav, days = 14) {
  const records = [];
  const now = new Date();
  let nav = baseNav;
  for (let i = days; i >= 0; i--) {
    const d = new Date(now);
    d.setDate(d.getDate() - i);
    const dateStr = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    // Skip weekends
    const dow = d.getDay();
    if (dow === 0 || dow === 6) continue;
    // Random daily change between -3% and +4%, skewed slightly positive
    const change = (Math.random() * 7 - 2.5) / 100;
    nav = nav * (1 + change);
    records.push({ date: dateStr, nav: Math.round(nav * 10000) / 10000 });
  }
  return records;
}

function loadSampleData() {
  if (funds.length > 0) {
    if (!confirm('已有数据，加载示例会覆盖，是否继续？')) return;
  }
  funds = SAMPLE_FUNDS.map(f => ({
    id: 'sample_' + f.code,
    code: f.code,
    name: f.name,
    shares: f.shares,
    costNav: f.costNav,
    records: genNavHistory(f.baseNav, 14)
  }));
  saveData();
  renderAll();
  showToast('✅ 已加载10只热门QDII基金');
}

// ===== Helpers =====
function fmtNum(n, d = 2) { return Number(n).toFixed(d); }
function fmtMoney(n) { return '¥' + Number(n).toFixed(2); }
function today() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

// ===== Calculations =====
function calcFund(f) {
  if (!f.records || f.records.length === 0) {
    return { curNav: f.costNav, prevNav: f.costNav, dailyPct: 0, dailyAmt: 0, totalPct: 0, totalAmt: 0, value: f.shares * f.costNav, weeklyPct: 0, hasData: false };
  }
  const sorted = [...f.records].sort((a,b) => a.date > b.date ? -1 : 1);
  const curNav = sorted[0].nav;
  const prevNav = sorted.length > 1 ? sorted[1].nav : f.costNav;
  const dailyPct = prevNav ? (curNav - prevNav) / prevNav * 100 : 0;
  const dailyAmt = f.shares * (curNav - prevNav);
  const totalPct = f.costNav ? (curNav - f.costNav) / f.costNav * 100 : 0;
  const totalAmt = f.shares * (curNav - f.costNav);
  const value = f.shares * curNav;

  // Weekly performance: compare to 7 days ago NAV
  const now = new Date();
  const weekAgo = new Date(now); weekAgo.setDate(weekAgo.getDate() - 7);
  const weekStr = weekAgo.getFullYear() + '-' + String(weekAgo.getMonth()+1).padStart(2,'0') + '-' + String(weekAgo.getDate()).padStart(2,'0');
  // Find the closest record to 7 days ago
  let weekNav = f.costNav;
  for (const r of sorted) {
    if (r.date >= weekStr || sorted.indexOf(r) === sorted.length - 1) {
      // Actually we want the oldest record within 7 days or the oldest overall
    }
  }
  // Simple: compare to record ~7 positions back (roughly 7 trading days)
  const weekIdx = Math.min(7, sorted.length - 1);
  const weekNavVal = sorted.length > weekIdx ? sorted[weekIdx].nav : f.costNav;
  const weeklyPct = weekNavVal ? (curNav - weekNavVal) / weekNavVal * 100 : 0;

  return { curNav, prevNav, dailyPct, dailyAmt, totalPct, totalAmt, value, weeklyPct, hasData: true };
}

function calcSummary() {
  let totalValue = 0, totalTodayAmt = 0, totalPnlAmt = 0;
  funds.forEach(f => {
    const r = calcFund(f);
    totalValue += r.value;
    totalTodayAmt += r.dailyAmt;
    totalPnlAmt += r.totalAmt;
  });
  return { totalValue, totalTodayAmt, totalPnlAmt };
}

function renderRanking() {
  const el = document.getElementById('rankList');
  if (funds.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="icon">🏆</div><p>请先添加基金</p></div>';
    return;
  }
  // Sort by weekly performance descending
  const ranked = funds.map(f => ({ ...calcFund(f), id: f.id, code: f.code, name: f.name }))
    .sort((a, b) => b.weeklyPct - a.weeklyPct);

  const maxPct = Math.max(...ranked.map(r => Math.abs(r.weeklyPct)), 1);

  el.innerHTML = ranked.map((r, idx) => {
    const cls = idx < 3 ? `r${idx+1}` : 'rn';
    const isUp = r.weeklyPct >= 0;
    const barPct = Math.min(Math.abs(r.weeklyPct) / maxPct * 100, 100);
    return `<div class="rank-card">
      <div class="rank-num ${cls}">${idx + 1}</div>
      <div class="rank-info">
        <div class="rank-name">${escHtml(r.name)}</div>
        <div class="rank-code">${r.code}</div>
      </div>
      <div class="rank-pct ${isUp ? 'up' : 'down'}">${isUp ? '+' : ''}${fmtNum(r.weeklyPct, 2)}%</div>
      <div class="rank-bar-wrap">
        <div class="rank-bar ${isUp ? 'up' : 'down'}" style="width:${barPct}%"></div>
      </div>
    </div>`;
  }).join('');
}

function renderAll() {
  renderPortfolio();
  renderRanking();
  renderRotate();
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ===== CRUD =====
function addFund(code, name, shares, costNav, curNav) {
  if (!code || !name || !shares || !costNav) return false;
  shares = parseFloat(shares); costNav = parseFloat(costNav);
  curNav = curNav ? parseFloat(curNav) : costNav;
  if (shares <= 0 || costNav <= 0 || curNav <= 0) return false;
  const fund = {
    id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
    code: code.trim(), name: name.trim(), shares, costNav,
    records: [{ date: today(), nav: curNav }]
  };
  funds.push(fund);
  saveData(); renderAll();
  return true;
}

function updateNav(fundId, newNav) {
  const f = funds.find(x => x.id === fundId);
  if (!f) return false;
  const ts = today();
  const idx = f.records.findIndex(r => r.date === ts);
  if (idx >= 0) f.records[idx].nav = newNav;
  else f.records.unshift({ date: ts, nav: newNav });
  saveData(); renderAll();
  return true;
}

function deleteFund(fundId) {
  funds = funds.filter(f => f.id !== fundId);
  saveData(); renderAll();
}

// ===== UI =====
function showToast(msg, dur = 1500) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._hide);
  t._hide = setTimeout(() => t.classList.remove('show'), dur);
}

function openNavModal(fundId) {
  updateTargetId = fundId;
  const f = funds.find(x => x.id === fundId);
  if (!f) return;
  document.getElementById('navModalTitle').textContent = f.name;
  const r = calcFund(f);
  document.getElementById('navCurrentDisplay').textContent = fmtNum(r.curNav, 4);
  document.getElementById('navNew').value = '';
  document.getElementById('navEstPct').value = '';
  document.getElementById('navEstResult').value = '';
  document.getElementById('navModal').classList.add('show');
}

// Tab switching
document.querySelectorAll('.tab-item').forEach(item => {
  item.addEventListener('click', function() {
    document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    this.classList.add('active');
    document.getElementById(this.dataset.tab).classList.add('active');
    // Show FAB only on portfolio tab
    document.getElementById('addBtn').style.display = this.dataset.tab === 'tabPortfolio' && funds.length > 0 ? 'flex' : 'none';
    // Refresh views
    if (this.dataset.tab === 'tabRanking') renderRanking();
    if (this.dataset.tab === 'tabRotate') renderRotate();
  });
});

// Close modals
document.getElementById('addModal').addEventListener('click', function(e) { if (e.target === this) this.classList.remove('show'); });
document.getElementById('navModal').addEventListener('click', function(e) { if (e.target === this) this.classList.remove('show'); });

// ===== Event Bindings =====
document.getElementById('addBtn').addEventListener('click', () => {
  ['fCode','fName','fShares','fCost','fNav'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('addModal').classList.add('show');
  setTimeout(() => document.getElementById('fCode').focus(), 350);
});
document.getElementById('addCancel').addEventListener('click', () => document.getElementById('addModal').classList.remove('show'));
document.getElementById('addSubmit').addEventListener('click', () => {
  const code = document.getElementById('fCode').value;
  const name = document.getElementById('fName').value;
  const shares = document.getElementById('fShares').value;
  const cost = document.getElementById('fCost').value;
  const nav = document.getElementById('fNav').value;
  if (!code || !name || !shares || !cost) { showToast('请填写完整信息'); return; }
  if (addFund(code, name, shares, cost, nav)) {
    document.getElementById('addModal').classList.remove('show');
    showToast('✅ 添加成功');
  } else showToast('请检查输入数据');
});

document.getElementById('navCancel').addEventListener('click', () => document.getElementById('navModal').classList.remove('show'));
document.getElementById('navSubmit').addEventListener('click', () => {
  const v = document.getElementById('navNew').value;
  if (!v) { showToast('请输入净值'); return; }
  if (updateNav(updateTargetId, parseFloat(v))) {
    document.getElementById('navModal').classList.remove('show');
    showToast('✅ 净值已更新');
  }
});
document.getElementById('navEstPct').addEventListener('input', function() {
  const pct = parseFloat(this.value);
  if (!isNaN(pct) && updateTargetId) {
    const f = funds.find(x => x.id === updateTargetId);
    if (f) {
      const r = calcFund(f);
      const est = r.curNav * (1 + pct / 100);
      document.getElementById('navEstResult').value = est.toFixed(4);
      document.getElementById('navNew').value = est.toFixed(4);
    }
  } else document.getElementById('navEstResult').value = '';
});

// Long press delete
let longPressTimer = null;
document.getElementById('fundList').addEventListener('touchstart', function(e) {
  const card = e.target.closest('.fund-card');
  if (!card || document.querySelector('.confirm-bar.show')) return;
  longPressTimer = setTimeout(() => {
    const idx = card.dataset.idx;
    if (idx !== undefined) {
      const f = funds[parseInt(idx)];
      if (f) { deleteTargetId = f.id; document.getElementById('confirmBar').classList.add('show'); document.querySelector('.confirm-bar .btn-yes').textContent = '删除 ' + f.name; }
    }
  }, 600);
});
document.getElementById('fundList').addEventListener('touchend', () => clearTimeout(longPressTimer));
document.getElementById('fundList').addEventListener('touchmove', () => clearTimeout(longPressTimer));
document.getElementById('cancelDelete').addEventListener('click', () => { document.getElementById('confirmBar').classList.remove('show'); deleteTargetId = null; });
document.getElementById('confirmDelete').addEventListener('click', () => { if (deleteTargetId) { deleteFund(deleteTargetId); showToast('已删除'); } document.getElementById('confirmBar').classList.remove('show'); deleteTargetId = null; });

document.getElementById('manageBtn').addEventListener('click', function() {
  const on = this.textContent === '管理';
  this.textContent = on ? '完成' : '管理';
  document.querySelectorAll('.fund-card').forEach(c => c.classList.toggle('show-delete', on));
});
document.getElementById('rankRefresh').addEventListener('click', () => { renderRanking(); showToast('已刷新'); });
document.getElementById('rotateRefresh').addEventListener('click', () => { renderRotate(); showToast('已刷新'); });

// ===== Init =====
loadData();
if (funds.length === 0) {
  // Offer sample data
  const list = document.getElementById('fundList');
  list.innerHTML = `<div class="empty-state">
    <div class="icon">📥</div>
    <p>首次使用，是否加载<br>10只2026年热门QDII基金？</p>
    <button class="btn-empty" onclick="loadSampleData()">📥 加载示例数据</button>
    <button class="btn-empty" onclick="document.getElementById('addModal').classList.add('show')" style="background:#999;margin-top:6px;">✏️ 手动添加</button>
  </div>`;
} else {
  renderAll();
}

// Click on fund cards also works for desktop (not just touch)
document.getElementById('fundList').addEventListener('click', function(e) {
  const card = e.target.closest('.fund-card');
  if (card) {
    const idx = card.dataset.idx;
    if (idx !== undefined) {
      const f = funds[parseInt(idx)];
      if (f) openNavModal(f.id);
    }
  }
});
</script>
