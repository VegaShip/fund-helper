<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>基金估值小助手</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #f5f6fa; min-height: 100vh; min-height: 100dvh;
  overflow-x: hidden; padding-bottom: 70px;
}
/* ===== Header ===== */
.header {
  background: linear-gradient(135deg, #1a73e8 0%, #1557b0 100%);
  color: #fff; padding: 44px 16px 10px;
  position: sticky; top: 0; z-index: 10;
  box-shadow: 0 2px 12px rgba(26,115,232,0.3);
}
.header-row { display: flex; align-items: center; justify-content: center; position: relative; }
.header-title { font-size: 17px; font-weight: 700; letter-spacing: 0.5px; }
.header-sub { font-size: 10px; text-align: center; opacity: 0.7; margin-top: 1px; }
.header-update { font-size: 9px; text-align: center; opacity: 0.5; margin-top: 1px; }
.header-loading { font-size: 9px; text-align: center; color: #ffd700; margin-top: 1px; display: none; }
.refresh-btn {
  position: absolute; right: 0; top: 50%; transform: translateY(-50%);
  background: rgba(255,255,255,0.2); border: none; color: #fff;
  width: 32px; height: 32px; border-radius: 50%; font-size: 14px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.3s;
}
.refresh-btn:active { background: rgba(255,255,255,0.35); }
.refresh-btn.spinning { animation: spin 0.8s linear infinite; }
@keyframes spin { 100% { transform: translateY(-50%) rotate(360deg); } }

/* ===== Summary ===== */
.summary {
  margin: -8px 12px 6px; background: #fff; border-radius: 14px; padding: 14px;
  box-shadow: 0 2px 16px rgba(0,0,0,0.06); position: relative; z-index: 2;
}
.summary-row { display: flex; justify-content: space-between; align-items: baseline; }
.summary-label { font-size: 12px; color: #999; }
.summary-value { font-size: 22px; font-weight: 800; color: #333; }
.summary-value .currency { font-size: 13px; font-weight: 600; }
.summary-details { display: flex; gap: 0; margin-top: 8px; }
.summary-item { flex: 1; text-align: center; border-right: 1px solid #f0f0f0; }
.summary-item:last-child { border-right: none; }
.summary-item .val { font-size: 15px; font-weight: 700; }
.summary-item .val.up { color: #e74c3c; }
.summary-item .val.down { color: #00b894; }
.summary-item .lbl { font-size: 10px; color: #999; margin-top: 1px; }

/* ===== Index Bar ===== */
.index-bar { background: #fff; margin: 0 0 6px; padding: 8px 0; box-shadow: 0 1px 6px rgba(0,0,0,0.04); }
.index-bar-header { display: flex; justify-content: space-between; align-items: center; padding: 0 12px 6px; }
.index-bar-title { font-size: 12px; font-weight: 700; color: #666; }
.index-bar-status { font-size: 9px; color: #ccc; }
.index-scroll { display: flex; gap: 6px; overflow-x: auto; padding: 0 12px 2px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
.index-scroll::-webkit-scrollbar { display: none; }
.index-card { flex: 0 0 auto; min-width: 100px; padding: 6px 10px; border-radius: 8px; background: #f8f9fa; }
.index-card .ic-name { font-size: 10px; color: #888; font-weight: 600; }
.index-card .ic-pct { font-size: 15px; font-weight: 800; }
.index-card .ic-pct.up { color: #e74c3c; }
.index-card .ic-pct.down { color: #00b894; }
.index-card .ic-price { font-size: 9px; color: #aaa; margin-top: 1px; }
.index-divider { width: 1px; background: #eee; flex: 0 0 1px; margin: 4px 0; }

/* ===== Data source indicator ===== */
.data-badge {
  display: inline-block; font-size: 8px; padding: 1px 5px; border-radius: 3px;
  margin-left: 4px; font-weight: 600;
}
.data-badge.real { background: #e8f8f0; color: #00b894; }
.data-badge.cached { background: #fff8e8; color: #f39c12; }
.data-badge.failed { background: #ffe8e8; color: #e74c3c; }

/* ===== Tab Content ===== */
.tab-content { display: none; }
.tab-content.active { display: block; }
.section { padding: 0 12px; margin-top: 2px; }
.section-header { display: flex; justify-content: space-between; align-items: center; padding: 6px 4px; margin-bottom: 2px; }
.section-title { font-size: 14px; font-weight: 700; color: #333; }
.section-action { font-size: 12px; color: #1a73e8; font-weight: 600; cursor: pointer; padding: 4px 8px; }

/* ===== Fund Card ===== */
.fund-card { background: #fff; border-radius: 12px; margin-bottom: 8px; box-shadow: 0 1px 8px rgba(0,0,0,0.04); cursor: pointer; transition: transform 0.12s; position: relative; overflow: hidden; }
.fund-card:active .fund-card-main { transform: scale(0.99); }
.fund-card-main { padding: 12px 14px; transition: transform 0.12s; }
.fund-card .top { display: flex; justify-content: space-between; align-items: flex-start; }
.fund-card .name { font-size: 14px; font-weight: 700; color: #333; }
.fund-card .code { font-size: 10px; color: #999; margin-top: 1px; }
.fund-card .tag { display: inline-block; font-size: 9px; padding: 1px 5px; border-radius: 3px; font-weight: 600; margin-left: 4px; vertical-align: middle; }
.fund-card .tag.qdii { background: #e8f0fe; color: #1a73e8; }
.fund-card .tag.domestic { background: #fff3e0; color: #e67e22; }
.fund-card .nav-info { text-align: right; }
.fund-card .nav-value { font-size: 17px; font-weight: 800; color: #333; }
.fund-card .nav-date { font-size: 10px; color: #bbb; margin-top: 1px; }
.fund-card .nav-estimate { font-size: 9px; color: #f39c12; margin-top: 1px; }
.fund-card .bottom { display: flex; margin-top: 8px; gap: 0; }
.fund-card .stat { flex: 1; text-align: center; border-right: 1px solid #f5f5f5; }
.fund-card .stat:last-child { border-right: none; }
.fund-card .stat .s-val { font-size: 13px; font-weight: 700; }
.fund-card .stat .s-val.up { color: #e74c3c; }
.fund-card .stat .s-val.down { color: #00b894; }
.fund-card .stat .s-lbl { font-size: 10px; color: #bbb; margin-top: 1px; }
.fund-card .expand-icon { font-size: 10px; color: #ccc; text-align: center; margin-top: 4px; transition: transform 0.25s; }
.fund-card .expand-icon.open { transform: rotate(180deg); }

/* ===== Fund Card Detail ===== */
.fund-card-detail {
  max-height: 0; overflow: hidden;
  transition: max-height 0.35s ease, padding 0.35s ease;
  padding: 0 14px; border-top: 0px solid #f0f0f0;
}
.fund-card-detail.show { max-height: 980px; padding: 12px 14px; border-top-width: 1px; border-top-style: solid; }
.detail-section { margin-bottom: 12px; }
.detail-title { font-size: 12px; font-weight: 700; color: #666; margin-bottom: 6px; }
.chart-wrap { width: 100%; height: 150px; border-radius: 8px; background: #fafafa; overflow: hidden; position: relative; touch-action: none; }
.chart-wrap canvas { width: 100%; height: 100%; display: block; }
.chart-empty { display: flex; align-items: center; justify-content: center; height: 100%; color: #ccc; font-size: 12px; }

/* Holdings */
.holdings-table { width: 100%; }
.holding-row { display: flex; align-items: center; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #f5f5f5; font-size: 12px; }
.holding-row:last-child { border-bottom: none; }
.holding-name { font-weight: 600; color: #333; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.holding-weight { color: #999; width: 40px; text-align: right; margin-right: 6px; font-size: 11px; }
.holding-price { width: 66px; text-align: right; font-weight: 700; font-size: 12px; }
.holding-price.up { color: #e74c3c; }
.holding-price.down { color: #00b894; }
.holding-price.fail { color: #ccc; font-weight: 400; }
.holding-market { font-size: 8px; padding: 1px 4px; border-radius: 3px; margin-right: 4px; font-weight: 600; flex-shrink: 0; }
.holding-market.us { background: #e8f0fe; color: #1a73e8; }
.holding-market.hk { background: #fff3e0; color: #e67e22; }
.holding-market.cn { background: #e8f8f0; color: #00b894; }
.holding-retry { font-size: 9px; color: #1a73e8; cursor: pointer; text-decoration: underline; }

/* Historical table in detail */
.hist-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 11px; border-bottom: 1px solid #f8f8f8; }
.hist-row .hd { color: #666; }
.hist-row .hn { font-weight: 700; color: #333; }
.hist-row .hc { font-weight: 700; }
.hist-row .hc.up { color: #e74c3c; }
.hist-row .hc.down { color: #00b894; }

/* Recommendation */
.recommend-box { border-radius: 8px; padding: 10px 12px; margin-top: 4px; }
.recommend-box.buy { background: #fff5f5; border-left: 3px solid #e74c3c; }
.recommend-box.hold { background: #f8f9fa; border-left: 3px solid #f39c12; }
.recommend-box.sell { background: #f0fff4; border-left: 3px solid #00b894; }
.recommend-label { font-size: 14px; font-weight: 800; margin-bottom: 4px; }
.recommend-box.buy .recommend-label { color: #e74c3c; }
.recommend-box.hold .recommend-label { color: #f39c12; }
.recommend-box.sell .recommend-label { color: #00b894; }
.recommend-reason { font-size: 11px; color: #666; line-height: 1.6; }
.recommend-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
.recommend-tag { font-size: 9px; padding: 2px 6px; border-radius: 3px; font-weight: 600; }
.recommend-tag.bull { background: #ffe8e8; color: #e74c3c; }
.recommend-tag.bear { background: #e8f8f0; color: #00b894; }
.recommend-tag.neutral { background: #f0f0f0; color: #666; }

.detail-btn-row { display: flex; gap: 8px; margin-top: 8px; }
.detail-update-btn {
  flex: 1; height: 36px;
  background: #f0f4ff; color: #1a73e8; border: 1.5px dashed #c4d7f5;
  border-radius: 8px; font-size: 12px; font-weight: 700; font-family: inherit;
  cursor: pointer; transition: background 0.15s;
}
.detail-update-btn:active { background: #e0eaff; }
.detail-hist-btn {
  flex: 1; height: 36px;
  background: #f8f9fa; color: #666; border: 1.5px dashed #ddd;
  border-radius: 8px; font-size: 12px; font-weight: 700; font-family: inherit;
  cursor: pointer; transition: background 0.15s;
}
.detail-hist-btn:active { background: #e9ecef; }

/* ===== Ranking ===== */
.rank-card { background: #fff; border-radius: 12px; padding: 10px 14px; margin-bottom: 6px; box-shadow: 0 1px 6px rgba(0,0,0,0.03); display: flex; align-items: center; gap: 10px; }
.rank-num { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; color: #fff; flex-shrink: 0; }
.rank-num.r1 { background: linear-gradient(135deg,#ff6b6b,#e74c3c); }
.rank-num.r2 { background: linear-gradient(135deg,#ff9f43,#f39c12); }
.rank-num.r3 { background: linear-gradient(135deg,#feca57,#f1c40f); color: #333; }
.rank-num.rn { background: #dfe6e9; color: #666; }
.rank-info { flex: 1; min-width: 0; }
.rank-name { font-size: 13px; font-weight: 700; color: #333; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.rank-code { font-size: 10px; color: #999; }
.rank-pct { font-size: 16px; font-weight: 800; text-align: right; flex-shrink: 0; }
.rank-pct.up { color: #e74c3c; }
.rank-pct.down { color: #00b894; }
.rank-bar-wrap { width: 60px; height: 4px; background: #f0f0f0; border-radius: 2px; margin-left: 8px; flex-shrink: 0; overflow: hidden; }
.rank-bar { height: 100%; border-radius: 2px; }
.rank-bar.up { background: linear-gradient(90deg,#e74c3c,#ff6b6b); }
.rank-bar.down { background: linear-gradient(90deg,#00b894,#55efc4); }

/* ===== Rotation ===== */
.rotate-card { background: #fff; border-radius: 12px; padding: 14px; margin-bottom: 10px; }
.rotate-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.rotate-icon { font-size: 20px; }
.rotate-title { font-size: 14px; font-weight: 700; color: #333; }
.rotate-desc { font-size: 11px; color: #999; margin-top: 2px; }
.rotate-fund { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #f5f5f5; }
.rotate-fund:last-child { border-bottom: none; }
.rotate-fund .rf-name { font-size: 13px; font-weight: 600; color: #333; }
.rotate-fund .rf-code { font-size: 10px; color: #999; }
.rotate-fund .rf-pct { font-size: 13px; font-weight: 700; }
.rotate-fund .rf-pct.up { color: #e74c3c; }
.rotate-fund .rf-pct.down { color: #00b894; }
.rotate-badge { font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: 700; margin-left: 6px; }
.rotate-badge.buy { background: #ffe8e8; color: #e74c3c; }
.rotate-badge.sell { background: #e8f8f0; color: #00b894; }
.rotate-badge.hold { background: #f0f0f0; color: #666; }

/* ===== History Modal ===== */
.hist-modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100;
  display: none; justify-content: flex-end; align-items: center; flex-direction: column; backdrop-filter: blur(2px);
}
.hist-modal-overlay.show { display: flex; }
.hist-modal-overlay.show .hist-modal-sheet { animation: slideUp 0.3s ease-out; }
@keyframes slideUp { 0% { transform: translateY(100%); } 100% { transform: translateY(0); } }
.hist-modal-sheet {
  background: #fff; width: 100%; max-width: 500px;
  border-radius: 20px 20px 0 0;
  padding: 16px 16px calc(env(safe-area-inset-bottom, 16px) + 16px);
  max-height: 80vh; overflow-y: auto;
}
.hist-modal-handle { width: 36px; height: 4px; border-radius: 2px; background: #ddd; margin: 0 auto 12px; }
.hist-modal-title { font-size: 16px; font-weight: 700; color: #333; text-align: center; margin-bottom: 12px; }
.hist-date-row { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
.hist-date-input { flex: 1; height: 36px; border: 1.5px solid #e8e8e8; border-radius: 8px; padding: 0 8px; font-size: 13px; font-family: inherit; }
.hist-search-btn { height: 36px; padding: 0 16px; background: #1a73e8; color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 700; font-family: inherit; cursor: pointer; }
.hist-search-btn:active { opacity: 0.8; }
.hist-table-header { display: flex; justify-content: space-between; font-size: 10px; color: #999; padding: 4px 0; border-bottom: 1px solid #eee; }
.hist-table-row { display: flex; justify-content: space-between; font-size: 12px; padding: 6px 0; border-bottom: 1px solid #f5f5f5; }
.hist-table-row .hcol-date { width: 80px; color: #666; }
.hist-table-row .hcol-nav { width: 70px; font-weight: 700; color: #333; text-align: center; }
.hist-table-row .hcol-pct { width: 60px; font-weight: 700; text-align: right; }
.hist-table-row .hcol-pct.up { color: #e74c3c; }
.hist-table-row .hcol-pct.down { color: #00b894; }
.hist-loading-text { text-align: center; font-size: 12px; color: #ccc; padding: 20px; }
.hist-empty { text-align: center; font-size: 12px; color: #ccc; padding: 20px; }

/* ===== FAB ===== */
.fab {
  position: fixed; bottom: 80px; right: 16px;
  width: 52px; height: 52px; border-radius: 50%;
  background: linear-gradient(135deg, #1a73e8, #1557b0);
  color: #fff; border: none; font-size: 26px; font-weight: 300;
  box-shadow: 0 4px 16px rgba(26,115,232,0.4);
  cursor: pointer; z-index: 20; transition: transform 0.15s;
  display: flex; align-items: center; justify-content: center;
}
.fab:active { transform: scale(0.92); }

/* ===== Bottom Tab ===== */
.tab-bar { position: fixed; bottom: 0; left: 0; right: 0; z-index: 30; background: #fff; border-top: 1px solid #f0f0f0; display: flex; padding-bottom: env(safe-area-inset-bottom, 0); }
.tab-item { flex: 1; text-align: center; padding: 8px 0 6px; cursor: pointer; transition: all 0.15s; -webkit-user-select: none; user-select: none; }
.tab-item .tab-icon { font-size: 20px; display: block; }
.tab-item .tab-label { font-size: 10px; color: #999; font-weight: 600; margin-top: 1px; }
.tab-item.active .tab-label { color: #1a73e8; }
.tab-item.active .tab-icon { transform: scale(1.05); }

/* ===== Modal ===== */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100; display: none; justify-content: flex-end; align-items: center; flex-direction: column; backdrop-filter: blur(2px); }
.modal-overlay.show { display: flex; }
.modal-overlay.show .modal-sheet { animation: slideUp 0.3s ease-out; }
.modal-sheet { background: #fff; width: 100%; max-width: 500px; border-radius: 20px 20px 0 0; padding: 20px 20px calc(env(safe-area-inset-bottom, 16px) + 16px); max-height: 85vh; overflow-y: auto; }
.modal-handle { width: 36px; height: 4px; border-radius: 2px; background: #ddd; margin: 0 auto 16px; }
.modal-title { font-size: 17px; font-weight: 700; color: #333; text-align: center; margin-bottom: 14px; }
.form-group { margin-bottom: 12px; }
.form-label { display: block; font-size: 12px; color: #888; font-weight: 600; margin-bottom: 4px; }
.form-input { width: 100%; height: 40px; border: 1.5px solid #e8e8e8; border-radius: 10px; padding: 0 12px; font-size: 14px; font-family: inherit; outline: none; transition: border-color 0.2s; background: #fafafa; }
.form-input:focus { border-color: #1a73e8; background: #fff; }
.form-input::placeholder { color: #ccc; }
.form-row { display: flex; gap: 10px; }
.form-row .form-group { flex: 1; }
.btn-submit { width: 100%; height: 42px; background: linear-gradient(135deg, #1a73e8, #1557b0); color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; font-family: inherit; cursor: pointer; transition: opacity 0.15s; margin-top: 4px; }
.btn-submit:active { opacity: 0.85; }
.btn-cancel { width: 100%; height: 38px; background: none; color: #999; border: none; font-size: 13px; font-weight: 600; font-family: inherit; cursor: pointer; margin-top: 4px; }
.confirm-bar { display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 30; padding: 16px; padding-bottom: calc(env(safe-area-inset-bottom, 16px) + 16px); background: #fff; box-shadow: 0 -4px 20px rgba(0,0,0,0.1); justify-content: space-between; gap: 10px; }
.confirm-bar.show { display: flex; }
.confirm-bar .btn { flex: 1; height: 44px; border-radius: 10px; border: none; font-size: 15px; font-weight: 700; font-family: inherit; cursor: pointer; }
.confirm-bar .btn-yes { background: #e74c3c; color: #fff; }
.confirm-bar .btn-no { background: #f5f5f5; color: #666; }
.confirm-bar .btn:active { opacity: 0.8; }
.toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 200; background: rgba(0,0,0,0.75); color: #fff; padding: 12px 22px; border-radius: 10px; font-size: 13px; font-weight: 600; pointer-events: none; opacity: 0; transition: opacity 0.25s; }
.toast.show { opacity: 1; }
.shimmer { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 4px; }
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

@media (min-width: 500px) {
  .summary, .section, .index-bar { max-width: 480px; margin-left: auto; margin-right: auto; }
  .header { padding-left: calc(50vw - 240px); padding-right: calc(50vw - 240px); }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-row">
    <div class="header-title">📊 基金估值小助手</div>
    <button class="refresh-btn" id="refreshBtn" onclick="forceRefresh()">↻</button>
  </div>
  <div class="header-sub">QDII + 国内基金 · 实时行情 · 真实数据</div>
  <div class="header-update" id="updateTime">--</div>
  <div class="header-loading" id="headerLoading">⏳ 更新净值数据中...</div>
</div>

<div class="summary" id="summary">
  <div class="summary-row">
    <span class="summary-label">总持仓金额</span>
    <span class="summary-value" id="totalValue"><span class="currency">¥</span>0.00</span>
  </div>
  <div class="summary-details">
    <div class="summary-item"><div class="val" id="todayPnl">--</div><div class="lbl">今日收益</div></div>
    <div class="summary-item"><div class="val" id="totalPnl">--</div><div class="lbl">累计收益</div></div>
    <div class="summary-item"><div class="val" id="fundCount">0</div><div class="lbl">持有基金</div></div>
  </div>
</div>

<!-- Index Bar -->
<div class="index-bar" id="indexBar">
  <div class="index-bar-header">
    <span class="index-bar-title">📈 市场指数</span>
    <span class="index-bar-status" id="indexStatus">加载中...</span>
  </div>
  <div class="index-scroll" id="indexScroll"></div>
</div>

<!-- Tab: 持仓 -->
<div class="tab-content active" id="tabPortfolio">
  <div class="section">
    <div class="section-header"><span class="section-title">我的基金</span><span class="section-action" id="manageBtn">管理</span></div>
    <div id="fundList"></div>
  </div>
</div>
<!-- Tab: 排行 -->
<div class="tab-content" id="tabRanking">
  <div class="section">
    <div class="section-header"><span class="section-title">周涨跌排行榜</span><span class="section-action" id="rankRefresh">刷新</span></div>
    <div id="rankList"></div>
  </div>
</div>
<!-- Tab: 调仓 -->

// ===== Real Fund NAV API (天天基金 JSONP) =====
function fetchFundRealNAV(code) {
  return new Promise((resolve, reject) => {
    const script = document.createElement('script');
    const oldJsonpgz = window.jsonpgz;
    let resolved = false;
    window.jsonpgz = (data) => {
      if (resolved) return;
      resolved = true;
      window.jsonpgz = oldJsonpgz;
      try { document.head.removeChild(script); } catch(e) {}
      resolve(data);
    };
    script.src = 'https://fundgz.1234567.com.cn/js/' + code + '.js?rt=' + Date.now();
    script.onerror = () => {
      if (resolved) return;
      resolved = true;
      window.jsonpgz = oldJsonpgz;
      try { document.head.removeChild(script); } catch(e) {}
      reject(new Error('获取失败'));
    };
    document.head.appendChild(script);
    setTimeout(() => { if (!resolved) { resolved = true; window.jsonpgz = oldJsonpgz; try { document.head.removeChild(script); } catch(e) {} reject(new Error('超时')); } }, 8000);
  });
}

// Batch fetch with progress
async function fetchFundsNAVInBatches(codes, onProgress) {
  const batchSize = 3;
  const results = {};
  for (let i = 0; i < codes.length; i += batchSize) {
    const batch = codes.slice(i, i + batchSize);
    if (onProgress) onProgress(i, codes.length);
    const settled = await Promise.allSettled(batch.map(code => fetchFundRealNAV(code)));
    settled.forEach((s, j) => {
      const code = batch[j];
      if (s.status === 'fulfilled' && s.value) {
        results[code] = s.value;
        navCache[code] = { ...s.value, fetchTime: Date.now() };
      }
    });
    if (i + batchSize < codes.length) await new Promise(r => setTimeout(r, 400));
  }
  saveData();
  if (onProgress) onProgress(codes.length, codes.length);
  return results;
}

// ===== Stock Price API (Yahoo Finance) =====
const stockCache = {};
const STOCK_CACHE_TTL = 120000;

async function fetchStockPrices(symbols) {
  const unique = [...new Set(symbols)];
  const now = Date.now();
  const results = {};
  const toFetch = [];
  for (const sym of unique) {
    if (stockCache[sym] && now - stockCache[sym].ts < STOCK_CACHE_TTL) { results[sym] = stockCache[sym].data; }
    else { toFetch.push(sym); }
  }
  if (toFetch.length > 0) {
    const settled = await Promise.allSettled(toFetch.map(sym => fetchSingleStock(sym)));
    settled.forEach((s, i) => {
      const sym = toFetch[i];
      const d = s.status === 'fulfilled' && s.value ? s.value : null;
      stockCache[sym] = { data: d, ts: now };
      results[sym] = d;
    });
  }
  return results;
}

async function fetchSingleStock(symbol) {
  try {
    const encoded = symbol.includes('^') ? symbol.replace('^','%5E') : symbol;
    const url = 'https://query1.finance.yahoo.com/v8/finance/chart/' + encoded + '?range=5d&interval=1d';
    const resp = await fetch(url, { signal: AbortSignal.timeout(5000) });
    if (!resp.ok) return null;
    const data = await resp.json();
    const result = data.chart.result && data.chart.result[0];
    if (!result) return null;
    const meta = result.meta;
    const quotes = result.indicators.quote[0];
    const closes = quotes.close.filter(c => c !== null);
    const prevClose = closes.length > 1 ? closes[closes.length-2] : meta.previousClose || meta.regularMarketPrice;
    const cur = meta.regularMarketPrice;
    const change = cur - prevClose;
    const changePct = prevClose ? (change / prevClose * 100) : 0;
    return { price: cur, change, changePct, prevClose, real: true };
  } catch(e) { return null; }
}

// Tencent Finance JSONP index fetch (no Referer requirement, works globally)
// Batch-fetches all 3 US futures in one request
function fetchTencentIndices(symbols) {
  return new Promise((resolve, reject) => {
    const keys = symbols.map(s => 'v_' + s);
    keys.forEach(k => { delete window[k]; });
    const sc = document.createElement('script');
    sc.src = 'https://qt.gtimg.cn/q=' + symbols.join(',') + '&_=' + Date.now();
    let resolved = false;
    sc.onload = () => {
      if (resolved) return;
      resolved = true;
      try { document.head.removeChild(sc); } catch(e) {}
      const results = {};
      symbols.forEach(sym => {
        const key = 'v_' + sym;
        const raw = window[key];
        delete window[key];
        if (raw && typeof raw === 'string') {
          const p = raw.split(',');
          // Tencent format: [0]=price, [1]=changePct(%), [7]=prevClose(昨收), [8]=prevSettle
          const price = parseFloat(p[0]) || 0;
          const prevClose = parseFloat(p[7]) || price;
          const changePct = parseFloat(p[1]);
          console.log('[Tencent ' + sym + '] price=' + price + ' prevClose=' + prevClose + ' pct=' + changePct.toFixed(2) + '%');
          results[sym] = { price, changePct, change: price - prevClose, real: true };
        }
      });
      if (Object.keys(results).length > 0) {
        resolve(results);
      } else {
        reject(new Error('no data'));
      }
    };
    sc.onerror = () => { if (!resolved) { resolved = true; try { document.head.removeChild(sc); } catch(e) {} reject(new Error('failed')); } };
    document.head.appendChild(sc);
    setTimeout(() => { if (!resolved) { resolved = true; keys.forEach(k => delete window[k]); try { document.head.removeChild(sc); } catch(e) {} reject(new Error('timeout')); } }, 5000);
  });
}

// Yahoo Finance fetch fallback for US indices
async function fetchYahooIndex(symbol) {
  try {
    const url = 'https://query1.finance.yahoo.com/v8/finance/chart/' + symbol + '?range=1d&interval=5m';
    const resp = await fetch(url, { signal: AbortSignal.timeout(5000) });
    if (!resp.ok) return null;
    const data = await resp.json();
    const result = data.chart?.result?.[0];
    if (!result) return null;
    const meta = result.meta;
    const price = meta.regularMarketPrice;
    const prevClose = meta.previousClose || meta.regularMarketPreviousClose;
    if (!price || !prevClose) return null;
    const change = price - prevClose;
    const changePct = (change / prevClose) * 100;
    console.log('[Yahoo ' + symbol + '] price=' + price + ' prevClose=' + prevClose + ' pct=' + changePct.toFixed(2) + '%');
    return { price, changePct, change, real: true };
  } catch(e) {
    console.log('[Yahoo ' + symbol + '] fetch failed: ' + e.message);
    return null;
  }
}

let indexDataCache = null;
let indexDataTime = 0;
const INDEX_TTL = 120000;

async function fetchIndices() {
  const now = Date.now();
  if (indexDataCache && now - indexDataTime < INDEX_TTL) return indexDataCache;
  const results = {};

  // US futures: Tencent batch JSONP (no Referer restriction) with Yahoo fallback
  const usItems = INDEX_CONFIG.filter(x => x.type === 'us');
  const usSymbols = usItems.map(x => x.symbol);
  try {
    const tcResults = await fetchTencentIndices(usSymbols);
    usItems.forEach(item => {
      results[item.symbol] = tcResults[item.symbol] || null;
    });
  } catch(e) {
    console.log('[Index] Tencent batch fetch failed, trying Yahoo fallback');
    const fbSettled = await Promise.allSettled(usItems.map(x => fetchYahooIndex(x.fallback)));
    fbSettled.forEach((s, i) => {
      results[usItems[i].symbol] = (s.status === 'fulfilled' && s.value) ? s.value : null;
    });
  }

  // China indices via Eastmoney JSONP
  const emItems = INDEX_CONFIG.filter(x => x.src === 'eastmoney');
  const eSettled = await Promise.allSettled(emItems.map(x => fetchEastmoneyIndex(x.secid)));

// ===== Calculations =====
function calcFund(f) {
  if (!f.records || f.records.length === 0) {
    const curNav = f._estimate ? f._estimate.nav : (f.costNav || 0);
    return { curNav, prevNav: f.costNav || curNav, dailyPct: 0, dailyAmt: 0, totalPct: 0, totalAmt: 0, value: f.shares * curNav, weeklyPct: 0, hasData: false };
  }
  const sorted = [...f.records].sort((a,b) => a.date > b.date ? -1 : 1);
  const curNav = sorted[0].nav;
  const prevNav = sorted.length > 1 ? sorted[1].nav : (f.costNav || curNav);
  const dailyPct = prevNav ? (curNav - prevNav) / prevNav * 100 : 0;
  const dailyAmt = f.shares * (curNav - prevNav);
  const totalPct = f.costNav ? (curNav - f.costNav) / f.costNav * 100 : 0;
  const totalAmt = f.costNav ? f.shares * (curNav - f.costNav) : 0;
  const value = f.shares * curNav;
  const weekIdx = Math.min(7, sorted.length - 1);
  const weekNav = sorted.length > weekIdx ? sorted[weekIdx].nav : (f.costNav || curNav);
  const weeklyPct = weekNav ? (curNav - weekNav) / weekNav * 100 : 0;
  return { curNav, prevNav, dailyPct, dailyAmt, totalPct, totalAmt, value, weeklyPct, hasData: true };
}

function calcSummary() {
  let totalValue = 0, totalTodayAmt = 0, totalPnlAmt = 0;
  funds.forEach(f => { const r = calcFund(f); totalValue += r.value; totalTodayAmt += r.dailyAmt; totalPnlAmt += r.totalAmt; });
  return { totalValue, totalTodayAmt, totalPnlAmt };
}

// ===== Interactive Chart =====
const chartDataMap = {};

function drawNavChart(fundId, highlightIdx) {
  const f = funds.find(x => x.id === fundId);
  if (!f || !f.records || f.records.length < 2) {
    // Show empty chart message
    const wrap = document.querySelector('#chart_' + fundId)?.parentElement;
    if (wrap) {
      // If only 1 record, show message on canvas
      const canvas = document.getElementById('chart_' + fundId);
      if (canvas) {
        const W = wrap.clientWidth || 280; const H = 150;
        const dpr = window.devicePixelRatio || 1;
        canvas.width = W * dpr; canvas.height = H * dpr;
        canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
        const ctx = canvas.getContext('2d');
        ctx.scale(dpr, dpr);
        ctx.clearRect(0, 0, W, H);
        ctx.fillStyle = '#ccc'; ctx.font = '12px sans-serif'; ctx.textAlign = 'center';
        ctx.fillText(f.records.length === 0 ? '暂无净值数据' : '数据不足（需2天以上）', W/2, H/2);
        ctx.fillText(f.records.length === 0 ? '点击更新净值或等待自动获取' : '再更新一次即可显示走势图', W/2, H/2 + 18);
      }
    }
    return;
  }
  const canvas = document.getElementById('chart_' + fundId);
  if (!canvas) return;
  const container = canvas.parentElement;
  const W = container.clientWidth || 280;
  const H = container.clientHeight || 150;
  const dpr = window.devicePixelRatio || 1;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const sorted = [...f.records].sort((a,b) => a.date.localeCompare(b.date));
  const navs = sorted.map(r => r.nav);
  const dates = sorted.map(r => r.date);
  const minN = Math.min(...navs) * 0.998;
  const maxN = Math.max(...navs) * 1.002;
  const range = maxN - minN;
  if (range === 0) return;
  const pad = { top: 12, bottom: 20, left: 6, right: 22 };
  const cw = W - pad.left - pad.right;
  const ch = H - pad.top - pad.bottom;
  const isUp = navs[navs.length-1] >= navs[0];
  const lineColor = isUp ? '#e74c3c' : '#00b894';

  const points = navs.map((n, i) => ({
    x: pad.left + (i / (navs.length-1)) * cw,
    y: pad.top + (1 - (n - minN) / range) * ch,
  }));
  chartDataMap[fundId] = { points, navs, dates, sorted, pad, cw, ch, minN, maxN, range, W, H, lineColor };

  ctx.clearRect(0, 0, W, H);

  // Grid
  ctx.strokeStyle = '#f0f0f0'; ctx.lineWidth = 0.5;
  for (let i = 0; i <= 3; i++) {
    const y = pad.top + (ch / 3) * i;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W-pad.right, y); ctx.stroke();
    ctx.fillStyle = '#c8c8c8'; ctx.font = '8px sans-serif'; ctx.textAlign = 'right';
    ctx.fillText((maxN - range/3*i).toFixed(4), pad.left + cw + 20, y+3);
  }

  // Area fill
  ctx.beginPath();
  points.forEach((p, i) => { i===0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y); });
  ctx.lineTo(pad.left+cw, pad.top+ch); ctx.lineTo(pad.left, pad.top+ch); ctx.closePath();
  const gd = ctx.createLinearGradient(0, pad.top, 0, pad.top+ch);
  gd.addColorStop(0, lineColor+'2A'); gd.addColorStop(1, lineColor+'05');
  ctx.fillStyle = gd; ctx.fill();

  // Line
  ctx.beginPath(); ctx.strokeStyle = lineColor; ctx.lineWidth = 1.5; ctx.lineJoin = 'round';
  points.forEach((p, i) => { i===0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y); });
  ctx.stroke();

  // End dot
  const last = points[points.length-1];
  ctx.beginPath(); ctx.arc(last.x, last.y, 3, 0, Math.PI*2); ctx.fillStyle = lineColor; ctx.fill();
  ctx.fillStyle = lineColor; ctx.font = 'bold 9px sans-serif'; ctx.textAlign = 'left';
  ctx.fillText(navs[navs.length-1].toFixed(4), last.x + 5, last.y - 3);

  // X-axis dates
  ctx.fillStyle = '#c8c8c8'; ctx.font = '8px sans-serif'; ctx.textAlign = 'center';
  const labelIndices = [0, Math.floor(navs.length/2), navs.length-1];
  labelIndices.forEach(idx => { ctx.fillText(dates[idx].slice(5), points[idx].x, pad.top+ch+14); });

  // Highlight
  if (highlightIdx >= 0 && highlightIdx < points.length) {
    const hp = points[highlightIdx];
    ctx.setLineDash([3,3]); ctx.strokeStyle = '#999'; ctx.lineWidth = 0.8;
    ctx.beginPath(); ctx.moveTo(hp.x, pad.top); ctx.lineTo(hp.x, pad.top+ch); ctx.stroke();
    ctx.setLineDash([]);
    ctx.beginPath(); ctx.arc(hp.x, hp.y, 4, 0, Math.PI*2); ctx.fillStyle = lineColor; ctx.fill();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5; ctx.stroke();

    const tw = 90; const th = 28;
    let tx = hp.x - tw/2; const ty = hp.y - th - 8;
    if (tx < 2) tx = 2; if (tx + tw > W - 2) tx = W - tw - 2;
    ctx.fillStyle = 'rgba(0,0,0,0.75)';
    ctx.beginPath(); ctx.roundRect(tx, ty, tw, th, 4); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = 'bold 9px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(dates[highlightIdx].slice(5) + '  ' + navs[highlightIdx].toFixed(4), tx + tw/2, ty + 18);
  }
}

function setupChartInteraction(fundId) {
  const canvas = document.getElementById('chart_' + fundId);
  if (!canvas) return;
  const handler = (e) => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const x = clientX - rect.left;
    const data = chartDataMap[fundId];
    if (!data || !data.points) return;
    let minDist = Infinity, idx = -1;
    data.points.forEach((p, i) => { const dist = Math.abs(p.x - x); if (dist < minDist) { minDist = dist; idx = i; } });
    if (idx >= 0 && minDist < rect.width * 0.4) drawNavChart(fundId, idx);
  };
  const clearHandler = () => { if (expandedFundId === fundId) drawNavChart(fundId, -1); };
  canvas.addEventListener('touchstart', handler, { passive: false });
  canvas.addEventListener('touchmove', handler, { passive: false });
  canvas.addEventListener('touchend', clearHandler);
  canvas.addEventListener('mousemove', handler);
  canvas.addEventListener('mouseleave', clearHandler);
}

// ===== Recommendation =====
function generateRecommendation(f) {
  const r = calcFund(f);
  if (!r.hasData || !f.records || f.records.length < 3)
    return { action: 'hold', label: '数据不足', reason: '需要至少3天真实净值数据以生成建议，点击下方"更新净值"或等待自动获取', tags: [] };
  const sorted = [...f.records].sort((a,b) => a.date.localeCompare(b.date));
  const navs = sorted.map(x => x.nav);
  const ma5 = navs.slice(-5).reduce((s,n) => s+n,0)/Math.min(5,navs.length);
  const ma10 = navs.slice(-10).reduce((s,n) => s+n,0)/Math.min(10,navs.length);
  const cur = navs[navs.length-1];
  let score = 0; const tags = [];
  if (cur > ma5 && ma5 > ma10) { score += 2; tags.push({ text: '多头排列', type: 'bull' }); }
  else if (cur > ma5) { score += 1; tags.push({ text: '短期偏强', type: 'bull' }); }
  else if (cur < ma5 && ma5 < ma10) { score -= 2; tags.push({ text: '空头排列', type: 'bear' }); }
  else if (cur < ma5) { score -= 1; tags.push({ text: '短期偏弱', type: 'bear' }); }
  else tags.push({ text: '震荡整理', type: 'neutral' });
  const changes = [];
  for (let i = navs.length-1; i > 0 && changes.length < 3; i--) changes.push((navs[i]-navs[i-1])/navs[i-1]*100);
  const mom = changes.length ? changes.reduce((a,b)=>a+b,0)/changes.length : 0;
  if (mom > 1) { score += 1; tags.push({ text: '近3日强势', type: 'bull' }); }
  else if (mom < -1) { score -= 1; tags.push({ text: '近3日走弱', type: 'bear' }); }
  if (r.weeklyPct > 3) { score += 1; tags.push({ text: '周涨'+r.weeklyPct.toFixed(1)+'%', type: 'bull' }); }
  else if (r.weeklyPct < -3) { score -= 1; tags.push({ text: '周跌'+(-r.weeklyPct).toFixed(1)+'%', type: 'bear' }); }
  if (r.totalPct > 10) tags.push({ text: '盈利+'+r.totalPct.toFixed(0)+'%', type: 'bull' });
  else if (r.totalPct < -10) tags.push({ text: '亏损'+(-r.totalPct).toFixed(0)+'%', type: 'bear' });

  let action, label, reason;
  if (score >= 2) {
    action = 'buy'; label = '⭐ 推荐增持';
    reason = '净值走势强劲，均线多头排列。近1周'+(r.weeklyPct>=0?'+':'')+r.weeklyPct.toFixed(2)+'%，短期动量向上，建议逢低加仓。';
  } else if (score >= 0) {
    action = 'hold'; label = '📌 持有观望';
    reason = '净值窄幅震荡，趋势尚不明确。近1周'+(r.weeklyPct>=0?'+':'')+r.weeklyPct.toFixed(2)+'%，建议继续持有观察。';
  } else {
    action = 'sell'; label = '⚠️ 建议减持';
    reason = '净值持续走弱，均线空头排列。近1周'+r.weeklyPct.toFixed(2)+'%，短期承压，建议减仓控制风险。';
    if (r.totalPct < -10) reason += ' 累计亏损'+r.totalPct.toFixed(1)+'%，注意止损。';
  }
  const holdings = FUND_HOLDINGS[f.code];
  if (holdings && holdings.length > 0) reason += ' 第一大持仓'+holdings[0].name+'（占比'+holdings[0].weight+'%）。';
  return { action, label, reason, tags: tags.slice(0, 4) };
}

          }

      ? '<span class="data-badge '+(f.records[0].real ? 'real' : 'cached')+'">'+(f.records[0].real ? '真实数据' : '本地数据')+'</span>'
      : '';
    recommendEl.innerHTML = '<div class="recommend-box '+rec.action+'"><div class="recommend-label">'+rec.label+dataBadge+'</div><div class="recommend-reason">'+rec.reason+'</div>' +
      (rec.tags.length ? '<div class="recommend-tags">'+rec.tags.map(t => '<span class="recommend-tag '+t.type+'">'+escHtml(t.text)+'</span>').join('')+'</div>' : '') + '</div>';
  }
}

  document.getElementById('histResult').innerHTML = '<div class="hist-empty">请选择日期范围后查询</div>';
  document.getElementById('histModal').classList.add('show');
}

async function queryHistoricalData() {
  const fundId = histQueryFundId;
  if (!fundId) return;
  const f = funds.find(x => x.id === fundId);
  if (!f) return;
  const startDate = document.getElementById('histStartDate').value;
  const endDate = document.getElementById('histEndDate').value;
  if (!startDate || !endDate) { showToast('请选择开始和结束日期'); return; }

  const resultEl = document.getElementById('histResult');
  resultEl.innerHTML = '<div class="hist-loading-text">⏳ 查询中...</div>';

  try {
    const startFormatted = startDate.replace(/-/g, '');
    const endFormatted = endDate.replace(/-/g, '');
    const data = await fetchFundHistoryData(f.code, 1, 60, startFormatted, endFormatted);
    if (data && data.Data && data.Data.LSJZList && data.Data.LSJZList.length > 0) {
      const list = data.Data.LSJZList;
      resultEl.innerHTML = '<div style="font-size:10px;color:#999;margin-bottom:4px;">查到 ' + list.length + ' 条记录（天天基金真实数据）</div>' +
        '<div class="hist-table-header"><span class="hcol-date" style="width:80px;">日期</span><span class="hcol-nav" style="width:70px;text-align:center;">单位净值</span><span class="hcol-pct" style="width:60px;text-align:right;">涨跌幅</span></div>' +
        list.map((item, i) => {
          const pct = i < list.length-1 ? ((parseFloat(item.DWJZ) - parseFloat(list[i+1].DWJZ)) / parseFloat(list[i+1].DWJZ) * 100) : 0;
          const isUp = pct >= 0;
          return '<div class="hist-table-row"><span class="hcol-date">'+item.FSRQ+'</span><span class="hcol-nav">'+parseFloat(item.DWJZ).toFixed(4)+'</span><span class="hcol-pct '+(isUp?'up':'down')+'">'+(i===list.length-1?'--':(isUp?'+':'')+pct.toFixed(2)+'%')+'</span></div>';
        }).join('');
    } else {
      resultEl.innerHTML = '<div class="hist-empty">未查到数据，请检查：<br>1. 基金代码是否正确<br>2. 日期范围是否合适<br>3. 网络连接是否正常</div>';
    }
  } catch(e) {
    // Fallback: show local data
    const sorted = (f.records || []).slice().sort((a,b) => a.date.localeCompare(b.date));
    if (sorted.length > 0) {
      resultEl.innerHTML = '<div style="font-size:10px;color:#f39c12;margin-bottom:4px;">⚠️ 在线查询失败，显示本地已存储的净值数据</div>' +
        '<div class="hist-table-header"><span class="hcol-date" style="width:80px;">日期</span><span class="hcol-nav" style="width:70px;text-align:center;">单位净值</span><span class="hcol-pct" style="width:60px;text-align:right;">数据来源</span></div>' +
        sorted.map(r => '<div class="hist-table-row"><span class="hcol-date">'+r.date+'</span><span class="hcol-nav">'+r.nav.toFixed(4)+'</span><span class="hcol-pct" style="font-size:10px;font-weight:400;color:#999;">'+(r.real?'天天基金':'本地记录')+'</span></div>').join('');
    } else {
      resultEl.innerHTML = '<div class="hist-empty">查询失败且无本地数据<br>请检查网络后重试</div>';
    }
  }
}

// ===== Auto NAV Update =====
async function autoUpdateNAVs(forceFlag) {
  if (funds.length === 0) return;
  const now = Date.now();
  const codesToUpdate = [];
  funds.forEach(f => {
    const cached = navCache[f.code];
    // Update if no cache, or cache older than 1 hour, or forced
    if (forceFlag || !cached || !cached.fetchTime || now - cached.fetchTime > 3600000) {
      codesToUpdate.push(f.code);
    }
  });
  if (codesToUpdate.length === 0) return;

  const headerLoading = document.getElementById('headerLoading');
  headerLoading.style.display = 'block';
  headerLoading.textContent = '⏳ 更新净值中...';

  try {
    await fetchFundsNAVInBatches(codesToUpdate, () => {});
    // Update fund records with new data
    funds.forEach(f => {
      const navData = navCache[f.code];
      if (navData && navData.dwjz) {
        const jzrq = navData.jzrq;
        const existIdx = f.records.findIndex(r => r.date === jzrq);
        if (existIdx === -1) {
          // Only add new records for NEW dates — never overwrite existing NAVs
          f.records.unshift({ date: jzrq, nav: parseFloat(navData.dwjz), real: true });
        }
        // Keep max 60 records
        if (f.records.length > 60) f.records = f.records.slice(0, 60);
        // Set costNav from oldest record if not already set
        if (!f.costNav && f.records.length > 0) f.costNav = f.records[f.records.length-1].nav;
        // Estimate for today (separate from actual NAV record)
        if (navData.gsz && navData.gztime) {
          f._estimate = { nav: parseFloat(navData.gsz), pct: parseFloat(navData.gszzl), time: navData.gztime };
        } else { delete f._estimate; }
      }
    });
    saveData(); renderAll(); updateTimestamp();
  } catch(e) { /* silent */ }
  headerLoading.style.display = 'none';
}

// ===== Force Refresh =====
async function forceRefresh() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning'); btn.textContent = '⏳';
  showToast('🔄 强制刷新中...');
  Object.keys(stockCache).forEach(k => delete stockCache[k]);
  indexDataCache = null; indexDataTime = 0;
  try { localStorage.removeItem(INDEX_CACHE_KEY); } catch(e) {}
  await autoUpdateNAVs(true);
  renderAll(); renderIndexBar(); updateTimestamp();
  btn.textContent = '↻'; btn.classList.remove('spinning');
  showToast('✅ 已强制刷新所有数据');
}

// ===== CRUD =====
function addFund(code, name, shares, costNav, curNav) {
  if (!code || !name || !shares || !costNav) return false;
  shares = parseFloat(shares); costNav = parseFloat(costNav);
  curNav = curNav ? parseFloat(curNav) : costNav;
  if (shares <= 0 || costNav <= 0 || curNav <= 0) return false;
  funds.push({ id: Date.now().toString(36)+Math.random().toString(36).slice(2,6), code: code.trim(), name: name.trim(), shares, costNav, records: [{ date: todayStr(), nav: curNav, real: false }] });
  saveData(); renderAll(); return true;
}
function updateNav(fundId, newNav) {
  const f = funds.find(x => x.id === fundId); if (!f) return false;
  const ts = todayStr(); const idx = f.records.findIndex(r => r.date === ts);
  if (idx >= 0) f.records[idx].nav = newNav; else f.records.unshift({ date: ts, nav: newNav, real: false });
  if (!f.costNav) f.costNav = newNav;
  saveData(); renderAll(); return true;
}
function deleteFund(fundId) {
  funds = funds.filter(f => f.id !== fundId); if (expandedFundId === fundId) expandedFundId = null; saveData(); renderAll();
}

}
